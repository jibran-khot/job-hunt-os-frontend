<header class="topbar">
    <div class="topbar__left">
        <button type="button" class="topbar__menu-button" (click)="toggleMenu()" aria-label="Toggle sidebar">
            <span class="material-symbols-outlined">
                menu
            </span>
        </button>
    </div>

    <div class="topbar__right">
        <div class="topbar__profile">
            <button type="button" class="topbar__profile-button" (click)="toggleProfileMenu($event)"
                aria-label="Open profile menu">
                <span class="material-symbols-outlined">
                    account_circle
                </span>

                <span class="material-symbols-outlined">
                    expand_more
                </span>
            </button>

            @if (isProfileMenuOpen) {
            <div class="topbar__dropdown" (click)="stopPropagation($event)">
                <button type="button" class="topbar__dropdown-item" (click)="navigateToSettings()">
                    <span class="material-symbols-outlined">
                        settings
                    </span>

                    <span>
                        Settings
                    </span>
                </button>

                <button type="button" class="topbar__dropdown-item" (click)="logout()">
                    <span class="material-symbols-outlined">
                        logout
                    </span>

                    <span>
                        Logout
                    </span>
                </button>
            </div>
            }
        </div>
    </div>
</header>
