<div class="application-header">

    <div class="application-header__content">

        <div class="application-header__details">

            <div class="application-header__title-section">
                <h1 class="application-header__company-name">
                    {{ companyName }}
                </h1>

                <app-status-chip [status]="status">
                </app-status-chip>
            </div>

            <p class="application-header__job-title">
                {{ jobTitle }}
            </p>

            <div class="application-header__metadata">

                <div class="application-header__metadata-item">
                    <span class="application-header__metadata-label">
                        Recruiter
                    </span>
                    <span class="application-header__metadata-value">
                        {{ recruiterName }}
                    </span>
                </div>

                <div class="application-header__metadata-item">
                    <span class="application-header__metadata-label">
                        Applied Date
                    </span>
                    <span class="application-header__metadata-value">
                        {{ appliedDate }}
                    </span>
                </div>

                <div class="application-header__metadata-item">
                    <span class="application-header__metadata-label">
                        Location
                    </span>
                    <span class="application-header__metadata-value">
                        {{ location }}
                    </span>
                </div>

            </div>

        </div>

        <div class="application-header__actions">

            <select class="application-header__status-select" [value]="status"
                (change)="updateStatus($any($event.target).value)">

                @for (
                statusOption of availableStatuses;
                track statusOption
                ) {
                <option [value]="statusOption">
                    {{ statusOption }}
                </option>
                }

            </select>

            <button type="button" class="application-header__action-button" (click)="openActions()">
                Actions
            </button>

        </div>

    </div>

</div>
