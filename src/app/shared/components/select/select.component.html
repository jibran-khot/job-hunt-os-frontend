<div class="select" [class.select--focused]="isFocused()" [class.select--disabled]="isDisabled()"
    [class.select--error]="shouldShowError()">
    @if (label()) {
    <label class="select__label" [attr.for]="selectId()">
        <span class="select__label-text">
            {{ label() }}
        </span>

        @if (required()) {
        <span class="select__required-indicator">
            *
        </span>
        }
    </label>
    }

    <div class="select__field-wrapper">
        <select class="select__field" [id]="selectId()" [value]="getSelectedValue()" [required]="required()"
            [disabled]="isDisabled()" [attr.aria-invalid]="shouldShowError()" [attr.aria-describedby]="
                helperText()
                    ? selectId() + '-helper'
                    : null
            " (change)="onSelectChange($event)" (focus)="onFocus()" (blur)="onBlur()">
            <option value="" disabled>
                {{ placeholder() }}
            </option>

            @for (
            option of options();
            track trackByOptionValue($index, option)
            ) {
            <option [value]="option.value" [disabled]="option.disabled ?? false">
                {{ option.label }}
            </option>
            }
        </select>

        <span class="select__icon material-symbols-outlined" aria-hidden="true">
            expand_more
        </span>
    </div>

    @if (helperText()) {
    <div class="select__footer">
        <p class="select__helper-text" [id]="selectId() + '-helper'">
            {{ helperText() }}
        </p>
    </div>
    }

    @if (control() && shouldShowError()) {
    <app-validation-message [control]="control()!" />
    }
</div>
