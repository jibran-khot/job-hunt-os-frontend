<div class="textarea" [class.textarea--focused]="isFocused()" [class.textarea--disabled]="isDisabled()"
    [class.textarea--error]="shouldShowError()">
    @if (label()) {
    <label class="textarea__label" [attr.for]="textareaId()">
        <span class="textarea__label-text">
            {{ label() }}
        </span>

        @if (required()) {
        <span class="textarea__required-indicator">
            *
        </span>
        }
    </label>
    }

    <div class="textarea__field-wrapper">
        <textarea #textareaElement class="textarea__field" [id]="textareaId()" [value]="value()" [rows]="rows()"
            [placeholder]="placeholder()" [readonly]="readonly()" [required]="required()" [disabled]="isDisabled()"
            [attr.maxlength]="maxLength()" [attr.minlength]="minLength()" [attr.aria-invalid]="shouldShowError()"
            [attr.aria-describedby]="
                helperText()
                    ? textareaId() + '-helper'
                    : null
            " (input)="onInput($event)" (focus)="onFocus()" (blur)="onBlur()"></textarea>
    </div>

    @if (helperText() || maxLength()) {
    <div class="textarea__footer">
        @if (helperText()) {
        <p class="textarea__helper-text" [id]="textareaId() + '-helper'">
            {{ helperText() }}
        </p>
        }

        @if (maxLength()) {
        <span class="textarea__character-count">
            {{ getCharacterCount() }}/{{ maxLength() }}
        </span>
        }
    </div>
    }

    @if (control() && shouldShowError()) {
    <app-validation-message [control]="control()!" />
    }
</div>
