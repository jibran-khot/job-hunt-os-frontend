<div class="textarea" [class.textarea--focused]="isFocused()" [class.textarea--disabled]="isDisabled() || disabled()"
    [class.textarea--error]="shouldShowError()">
    <label *ngIf="label()" class="textarea__label" [attr.for]="textareaId()">
        <span class="textarea__label-text">
            {{ label() }}
        </span>

        <span *ngIf="required()" class="textarea__required-indicator">
            *
        </span>
    </label>

    <div class="textarea__field-wrapper">
        <textarea #textareaElement class="textarea__field" [id]="textareaId()" [value]="value()" [rows]="rows()"
            [placeholder]="placeholder()" [readonly]="readonly()" [required]="required()"
            [disabled]="isDisabled() || disabled()" [attr.maxlength]="maxLength()" [attr.minlength]="minLength()"
            [attr.aria-invalid]="shouldShowError()" [attr.aria-describedby]="
        helperText()
          ? textareaId() + '-helper'
          : null
      " (input)="onInput($event)" (focus)="onFocus()" (blur)="onBlur()">
    </textarea>
    </div>

    <div *ngIf="helperText() || maxLength()" class="textarea__footer">
        <p *ngIf="helperText()" class="textarea__helper-text" [id]="textareaId() + '-helper'">
            {{ helperText() }}
        </p>

        <span *ngIf="maxLength()" class="textarea__character-count">
            {{ getCharacterCount() }}/{{ maxLength() }}
        </span>
    </div>

    <app-validation-message *ngIf="control() && shouldShowError()" [control]="control()" />
</div>
