<div *ngIf="shouldShowError" class="validation-message" role="alert" aria-live="assertive">
    <div class="validation-message__content">

        <span *ngIf="showIcon" class="validation-message__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"></circle>

                <path d="M12 7V13" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>

                <circle cx="12" cy="17" r="1" fill="currentColor"></circle>
            </svg>
        </span>

        <span class="validation-message__text">
            {{ errorMessage }}
        </span>

    </div>
</div>
