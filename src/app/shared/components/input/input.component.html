<div class="input" [class.input--focused]="isFocused()" [class.input--disabled]="isDisabled()"
    [class.input--error]="shouldShowError()">
    @if (label()) {
    <label class="input__label" [attr.for]="inputId()">
        <span class="input__label-text">
            {{ label() }}
        </span>

        @if (required()) {
        <span class="input__required-indicator">
            *
        </span>
        }
    </label>
    }

    <div class="input__field-wrapper">
        <input class="input__field" [id]="inputId()" [type]="getInputType()" [value]="value()"
            [placeholder]="placeholder()" [readonly]="readonly()" [required]="required()" [disabled]="isDisabled()"
            [autocomplete]="autocomplete()" [attr.maxlength]="maxLength()" [attr.minlength]="minLength()"
            [attr.aria-invalid]="shouldShowError()"
            [attr.aria-describedby]="helperText() ? inputId() + '-helper' : null" (input)="onInput($event)"
            (blur)="onBlur()" (focus)="onFocus()" />

        @if (shouldShowPasswordToggle()) {
        <button type="button" class="input__password-toggle" [disabled]="isDisabled()" [attr.aria-label]="
                    isPasswordVisible()
                        ? 'Hide password'
                        : 'Show password'
                " (click)="togglePasswordVisibility()">
            <span class="material-symbols-outlined">
                {{
                isPasswordVisible()
                ? 'visibility_off'
                : 'visibility'
                }}
            </span>
        </button>
        }
    </div>

    @if (helperText() || maxLength()) {
    <div class="input__footer">
        @if (helperText()) {
        <p class="input__helper-text" [id]="inputId() + '-helper'">
            {{ helperText() }}
        </p>
        }

        @if (maxLength()) {
        <span class="input__character-count">
            {{ getCharacterCount() }}/{{ maxLength() }}
        </span>
        }
    </div>
    }

    @if (control() && shouldShowError()) {
    <app-validation-message [control]="control()!" />
    }
</div>
