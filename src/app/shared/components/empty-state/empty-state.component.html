<div class="empty-state" [class.empty-state--centered]="centered" role="status" aria-live="polite">

    <div class="empty-state__icon" aria-hidden="true">
        {{ icon }}
    </div>

    <div class="empty-state__content">
        <h2 class="empty-state__title">
            {{ title }}
        </h2>

        <p class="empty-state__message">
            {{ message }}
        </p>
    </div>

    @if (showAction) {
    <button type="button" class="empty-state__action" (click)="retry()">
        {{ actionLabel }}
    </button>
    }
</div>
