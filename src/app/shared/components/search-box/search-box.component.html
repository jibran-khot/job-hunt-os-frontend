<div class="search-box">
    <div class="search-box__input-wrapper">

        <span class="search-box__icon" aria-hidden="true">
            🔍
        </span>

        <input type="text" class="search-box__input" [formControl]="searchControl" [placeholder]="placeholder"
            [attr.aria-label]="placeholder || 'Search input'" autocomplete="off" spellcheck="false"
            (keyup.enter)="onSearch()" />

        <div class="search-box__actions">

            @if (loading) {
            <div class="search-box__loader" aria-hidden="true">
                <span class="search-box__loader-spinner"></span>
            </div>
            }

            @if (
            showClearButton &&
            searchControl.value &&
            !loading
            ) {
            <button type="button" class="search-box__clear-button" aria-label="Clear search" (click)="clearSearch()">
                ✕
            </button>
            }

        </div>

    </div>
</div>
