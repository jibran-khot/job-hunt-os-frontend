<div *ngIf="isOpen" class="confirmation-dialog-backdrop" role="presentation" (click)="onBackdropClick()">
    <div class="confirmation-dialog" role="dialog" aria-modal="true" aria-labelledby="confirmation-dialog-title"
        aria-describedby="confirmation-dialog-message" (click)="onDialogClick($event)">
        <div class="confirmation-dialog__header">
            <h2 id="confirmation-dialog-title" class="confirmation-dialog__title">
                {{ config.title }}
            </h2>
        </div>

        <div class="confirmation-dialog__body">
            <p id="confirmation-dialog-message" class="confirmation-dialog__message">
                {{ config.message }}
            </p>
        </div>

        <div class="confirmation-dialog__footer">
            <button type="button" class="confirmation-dialog__button confirmation-dialog__button--secondary"
                (click)="cancel()">
                {{ config.cancelButtonText || 'Cancel' }}
            </button>

            <button type="button" class="confirmation-dialog__button" [ngClass]="{
          'confirmation-dialog__button--destructive': config.isDestructive,
          'confirmation-dialog__button--primary': !config.isDestructive
        }" (click)="confirm()">
                {{ config.confirmButtonText || 'Confirm' }}
            </button>
        </div>
    </div>
</div>
