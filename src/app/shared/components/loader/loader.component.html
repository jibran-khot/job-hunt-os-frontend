<div *ngIf="isLoading$ | async" class="loader" [ngClass]="loaderClasses" role="status" aria-live="polite"
    aria-busy="true">
    <div *ngIf="overlay" class="loader__backdrop"></div>

    <div class="loader__container">

        <div class="loader__spinner-wrapper">
            <span class="loader__spinner"></span>
        </div>

        <p *ngIf="message" class="loader__message">
            {{ message }}
        </p>

    </div>
</div>
